name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project claudeNotch.xcodeproj -quiet

      - name: Archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project claudeNotch.xcodeproj \
            -scheme claudeNotch \
            -configuration Release \
            -archivePath build/ClaudeNotch.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE="Manual" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            -quiet

      - name: Export app
        run: |
          mkdir -p build/Release
          cp -R "build/ClaudeNotch.xcarchive/Products/Applications/claudeNotch.app" build/Release/

      - name: Read version
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "build/Release/claudeNotch.app/Contents/Info.plist")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "build/Release/claudeNotch.app/Contents/Info.plist")
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (build $BUILD)"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          ditto -c -k --keepParent "build/Release/claudeNotch.app" build/ClaudeNotch-notarize.zip

          xcrun notarytool submit build/ClaudeNotch-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait

          xcrun stapler staple "build/Release/claudeNotch.app"

      - name: Install dmgbuild
        run: pip3 install --break-system-packages 'dmgbuild[badge_icons]'

      - name: Create DMG
        run: |
          ./Configuration/dmg/create_dmg.sh \
            build/Release/claudeNotch.app \
            build/ClaudeNotch.dmg \
            ClaudeNotch

      - name: Sign DMG with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          ./Configuration/sparkle/bin/sign_update build/ClaudeNotch.dmg --ed-key-file "$RUNNER_TEMP/sparkle_key"
          rm -f "$RUNNER_TEMP/sparkle_key"

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p appcast_staging docs
          cp build/ClaudeNotch.dmg appcast_staging/

          # Carry forward existing appcast entries
          if [ -f docs/appcast.xml ]; then
            cp docs/appcast.xml appcast_staging/
          fi

          echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          SPARKLE_KEY_FILE="$RUNNER_TEMP/sparkle_key" \
          ./Configuration/sparkle/bin/generate_appcast appcast_staging \
            --download-url-prefix "https://github.com/hpriehle/claude-notch/releases/download/${GITHUB_REF_NAME}/"
          rm -f "$RUNNER_TEMP/sparkle_key"

          cp appcast_staging/appcast.xml docs/appcast.xml

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "ClaudeNotch ${{ steps.version.outputs.marketing_version }}" \
            --generate-notes \
            build/ClaudeNotch.dmg

      - name: Commit appcast update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git stash -- docs/appcast.xml || true
          git checkout main
          git stash pop || true
          git add docs/appcast.xml
          git commit -m "Update appcast for $GITHUB_REF_NAME" || true
          git push origin main

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
